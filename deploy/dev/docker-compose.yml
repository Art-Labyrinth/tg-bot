# Staging (dev) stack. Run from the repo root, e.g.:
#   docker compose -f deploy/dev/docker-compose.yml up --build -d

name: tgbot-dev

services:
  bot:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      DEBUG: "false"
      TICKET_SERVICE: http://al-dev-backend:8000
      BOT_API_SECRET: ${BOT_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - main
      - bridge

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgbot
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot -d tgbot"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      bridge:
        aliases:
          - tgbot-postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      bridge:
        aliases:
          - tgbot-redis

volumes:
  pg_data:
  redis_data:

networks:
  main:
    external: true
  bridge:
