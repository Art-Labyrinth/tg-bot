# Local development stack. For deployment see deploy/main and deploy/dev.
# Values come from .env (compose auto-reads it for ${...} substitution).

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      DEBUG: ${DEBUG}
      TICKET_SERVICE: http://art-lab-backend:8000
      BOT_API_SECRET: ${BOT_API_SECRET}
      # Unique hostnames so DB/Redis don't collide with same-named services on
      # the external `main` network (the backend stack also has a `postgres`).
      POSTGRES_HOST: tgbot-postgres
      REDIS_HOST: tgbot-redis
    # Mount source read-only for local development: edit on the host, then
    # `docker compose restart bot` to pick changes up. :ro guards against the
    # container writing back into your working tree.
    volumes:
      - ./app:/app/app:ro
      - ./alembic.ini:/app/alembic.ini:ro
      # migrations is writable on purpose: it's where `alembic revision` writes
      # generated files. Source code above stays read-only.
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - main
      - bridge

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgbot
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot -d tgbot"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      bridge:
        aliases:
          - tgbot-postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      bridge:
        aliases:
          - tgbot-redis

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: gleep4711@gmail.com
      PGADMIN_DEFAULT_PASSWORD: xd9L@FyHew73DkK5tDG8za2w39pGu%E$
    ports:
      - "127.0.0.1:5051:80"
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - bridge

volumes:
  pg_data:
  redis_data:

networks:
  main:
    external: true
  bridge:
