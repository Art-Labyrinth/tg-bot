# Local development stack. For deployment see deploy/main and deploy/dev.
# Values come from .env (compose auto-reads it for ${...} substitution).

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      DEBUG: ${DEBUG}
      TICKET_SERVICE: http://art-lab-backend:8000
    # Mount source read-only for local development: edit on the host, then
    # `docker compose restart bot` to pick changes up. :ro guards against the
    # container writing back into your working tree.
    volumes:
      - ./app:/app/app:ro
      - ./alembic.ini:/app/alembic.ini:ro
      # migrations is writable on purpose: it's where `alembic revision` writes
      # generated files. Source code above stays read-only.
      - ./migrations:/app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgbot
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgbot -d tgbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7.7
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
